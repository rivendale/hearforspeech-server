name: Deploy API to Fly

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hearforspeech-server-fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy hearforspeech-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify production health
        run: curl --fail --retry 5 --retry-delay 5 https://api.hearforspeech.com/health
